name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks only, skip publish"
        required: false
        default: false
        type: boolean
      package_filter:
        description: "Comma-separated package names to test (e.g. pi-statusline,pi-specdocs)"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version-bumped packages
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BASE=""
          HEAD="${{ github.sha }}"
          SELECTED=()
          REASON=""

          MANUAL_TARGETS="${{ github.event.inputs.package_filter }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$MANUAL_TARGETS" ]]; then
            IFS=',' read -r -a RAW_PACKAGES <<< "$MANUAL_TARGETS"

            for RAW_PACKAGE in "${RAW_PACKAGES[@]}"; do
              REQUESTED="$(echo "$RAW_PACKAGE" | xargs)"

              [[ -z "$REQUESTED" ]] && continue

              PACKAGE="${REQUESTED}"

              if [[ "$PACKAGE" == @* ]]; then
                # Convert npm package names like @feniix/pi-statusline -> pi-statusline
                PACKAGE="${PACKAGE##*/}"
              fi

              if [[ "$PACKAGE" == packages/* ]]; then
                CANDIDATE="$PACKAGE"
              elif [[ "$PACKAGE" == pi-* ]]; then
                CANDIDATE="packages/$PACKAGE"
              else
                CANDIDATE="packages/pi-$PACKAGE"
              fi

              if [[ ! -f "$CANDIDATE/package.json" ]]; then
                echo "::error::Invalid package '$REQUESTED'. Use package names like pi-statusline or paths like packages/pi-statusline"
                exit 1
              fi

              SELECTED+=("$CANDIDATE")
            done

            if [[ ${#SELECTED[@]} -eq 0 ]]; then
              REASON="package_filter did not resolve to any valid packages: '$MANUAL_TARGETS'"
            fi
          else
            if [[ "${{ github.event_name }}" == "push" ]]; then
              BASE="${{ github.event.before }}"
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              BASE="$(git rev-parse --verify HEAD^ 2>/dev/null || true)"
            fi

            if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
              REASON="No base commit to compare (initial commit or missing history)."
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "reason=$REASON" >> "$GITHUB_OUTPUT"
              echo 'matrix=[]' >> "$GITHUB_OUTPUT"
              exit 0
            fi

            CHANGED_PACKAGE_FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '^packages/pi-[^/][^/]*/package.json$' || true)

            if [[ -z "$CHANGED_PACKAGE_FILES" ]]; then
              REASON="No package.json files changed between $BASE and $HEAD."
            fi

            while IFS= read -r FILE; do
              [[ -z "$FILE" ]] && continue
              PKG="$(dirname "$FILE")"
              OLD_VERSION="$(git show "$BASE:$FILE" 2>/dev/null | jq -r '.version // empty' || echo "")"
              NEW_VERSION="$(jq -r '.version // empty' "$FILE")"

              if [[ "$OLD_VERSION" != "$NEW_VERSION" ]]; then
                SELECTED+=("$PKG")
              fi
            done <<< "$CHANGED_PACKAGE_FILES"
          fi

          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            if [[ -z "$REASON" ]]; then
              REASON="No version changes detected in package.json files under packages/pi-*"
            fi

            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(printf '%s\n' "${SELECTED[@]}" | jq -R . | jq -s .)
            JOINED="$(printf '%s, ' "${SELECTED[@]}")"
            REASON="Version bump detected in: ${JOINED%, }"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
            echo 'matrix<<EOF' >> "$GITHUB_OUTPUT"
            echo "$MATRIX" >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          fi

  checks:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ needs.detect.outputs.matrix }}
      has_changes: ${{ needs.detect.outputs.has_changes }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- "${{ matrix.package }}"

      - name: Typecheck
        run: npx tsc --noEmit --project "${{ matrix.package }}/tsconfig.json"

      - name: Ensure new version is not already published
        shell: bash
        run: |
          set -euo pipefail

          NAME="$(jq -r '.name' "${{ matrix.package }}/package.json")"
          VERSION="$(jq -r '.version' "${{ matrix.package }}/package.json")"

          if npm view "${NAME}@${VERSION}" >/dev/null 2>&1; then
            echo "::error::${NAME}@${VERSION} is already published. Bump version before publishing."
            exit 1
          fi

      - name: Test
        run: npm run test -- "${{ matrix.package }}"

  checks_skipped:
    needs: detect
    if: needs.detect.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "::notice::Checks skipped: ${{ needs.detect.outputs.reason }}"

  publish:
    needs: checks
    if: needs.checks.outputs.has_changes == 'true' && (github.event.inputs.dry_run != 'true')
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Publish changed packages
        run: |
          set -euo pipefail

          for pkg in $(echo '${{ needs.checks.outputs.matrix }}' | jq -r '.[]'); do
            echo "Publishing $pkg"
            (cd "$pkg" && npm publish --access public --provenance)
          done

  publish_skipped:
    needs: checks
    if: needs.checks.outputs.has_changes == 'true' && (github.event.inputs.dry_run == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "::notice::Publish skipped because dry_run=true"

