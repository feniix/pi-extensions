name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version-bumped packages
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BASE=""
          HEAD="${{ github.sha }}"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_PACKAGE_FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '^packages/pi-[^/][^/]*/package.json$' || true)
          SELECTED=()

          while IFS= read -r FILE; do
            [[ -z "$FILE" ]] && continue
            PKG="$(dirname "$FILE")"
            OLD_VERSION="$(git show "$BASE:$FILE" 2>/dev/null | jq -r '.version // empty' || echo "")"
            NEW_VERSION="$(jq -r '.version // empty' "$FILE")"

            if [[ "$OLD_VERSION" != "$NEW_VERSION" ]]; then
              SELECTED+=("$PKG")
            fi
          done <<< "$CHANGED_PACKAGE_FILES"

          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix=[]' >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(printf '%s\n' "${SELECTED[@]}" | jq -R . | jq -s .)
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  checks:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- "${{ matrix.package }}"

      - name: Typecheck
        run: npx tsc --noEmit --project "${{ matrix.package }}/tsconfig.json"

      - name: Test
        run: npm run test -- "${{ matrix.package }}"

  publish:
    needs: checks
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Configure npm auth
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish changed packages
        run: |
          set -euo pipefail

          for pkg in $(echo '${{ needs.detect.outputs.matrix }}' | jq -r '.[]'); do
            echo "Publishing $pkg"
            npm --prefix "$pkg" publish --access public
          done
