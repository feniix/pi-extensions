name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          OUTPUT=$(./scripts/detect-ci-packages.sh "$BASE" "$HEAD")
          echo "$OUTPUT"

          HAS_CHANGES=$(echo "$OUTPUT" | awk -F= '/^has_changes=/{print $2}')
          MATRIX=$(echo "$OUTPUT" | awk -F= '/^matrix=/{print $2}')

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  checks:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome ci packages/${{ matrix.package }}

      - name: Typecheck
        run: npx tsc --noEmit --pretty false --project packages/${{ matrix.package }}/tsconfig.json

      - name: Test with coverage
        run: >-
          npx vitest run packages/${{ matrix.package }}/__tests__
          --coverage.enabled
          --coverage.reportsDirectory=coverage/${{ matrix.package }}
          --coverage.include=packages/${{ matrix.package }}/extensions/**/*.ts
          --coverage.thresholds.lines=70
          --coverage.thresholds.statements=70
          --coverage.thresholds.functions=70
          --coverage.thresholds.branches=60

      - name: Coverage summary
        run: >-
          node scripts/write-coverage-summary.mjs
          coverage/${{ matrix.package }}/coverage-summary.json
          ${{ matrix.package }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}
          path: coverage/${{ matrix.package }}
