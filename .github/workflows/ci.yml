name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          OUTPUT=$(./scripts/detect-ci-packages.sh "$BASE" "$HEAD")
          echo "$OUTPUT"

          HAS_CHANGES=$(echo "$OUTPUT" | awk -F= '/^has_changes=/{print $2}')
          MATRIX=$(echo "$OUTPUT" | awk -F= '/^matrix=/{print $2}')

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  checks:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome ci packages/${{ matrix.package }}

      - name: Typecheck
        run: npx tsc --noEmit --pretty false --project packages/${{ matrix.package }}/tsconfig.json

      - name: Test
        run: npx vitest run packages/${{ matrix.package }}/__tests__
