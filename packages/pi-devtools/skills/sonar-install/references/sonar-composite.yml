name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sonar-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Add build/codegen steps here if needed, e.g.:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 22
      # - run: npm ci && npm run build

      - uses: Spantree/github-actions/sonar@main
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-host-url: https://sonarqube.span.land
          project-key: PROJECT_KEY
          sources: src
          # tests: tests
          # test-inclusions: 'tests/**/*.test.ts'
          exclusions: '**/node_modules/**,**/dist/**'
